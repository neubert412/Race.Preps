<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Racepreps</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .splash {
      text-align: center;
      animation: fade 1.2s ease-in-out;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 20px;
    }

    @keyframes fade {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="splash">
    <img src="logo.jpg" alt="Racepreps">
    <h2>Racepreps startet…</h2>
  </div>

  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }

    // kurzer Splash → dann Weiterleitung
    setTimeout(() => {
      window.location.href = "https://racepreps.de";
    }, 1500);
  </script>

</body>
</html>
